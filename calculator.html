<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수박 분열 미니게임</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: radial-gradient(circle at top, #d9f99d, #86efac 38%, #22c55e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      color: #14532d;
    }
    .app {
      width: min(100%, 980px);
      background: rgba(255, 255, 255, 0.9);
      border-radius: 26px;
      box-shadow: 0 18px 45px rgba(20, 83, 45, 0.22);
      overflow: hidden;
      backdrop-filter: blur(6px);
    }
    .header {
      padding: 20px 22px 12px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      color: #166534;
    }
    .sub {
      margin-top: 6px;
      font-size: 14px;
      color: #3f6212;
    }
    .panel {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .stat, .btn {
      background: #ecfccb;
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #365314;
    }
    .btn {
      cursor: pointer;
      background: #bbf7d0;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }
    .btn:hover { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }
    .canvas-wrap {
      padding: 0 16px 16px;
    }
    canvas {
      width: 100%;
      height: min(72vh, 680px);
      display: block;
      background: linear-gradient(180deg, #f0fdf4 0%, #dcfce7 100%);
      border-radius: 22px;
      border: 3px solid #86efac;
      touch-action: manipulation;
    }
    .guide {
      padding: 0 22px 22px;
      color: #3f6212;
      font-size: 14px;
      line-height: 1.55;
    }
    .guide strong {
      color: #166534;
    }
    @media (max-width: 640px) {
      h1 { font-size: 25px; }
      .stat, .btn { font-size: 14px; padding: 11px 14px; }
      .guide { font-size: 13px; }
      canvas { height: 68vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>🍉 수박 분열 미니게임</h1>
        <div class="sub">공을 클릭하거나 터치하면 분열합니다. 수 → 박 2개, 박 → 수 2개</div>
      </div>
      <div class="panel">
        <div class="stat" id="countStat">공 개수: 1</div>
        <div class="stat" id="modeStat">상태: 진행 중</div>
        <button class="btn" id="resetBtn">처음부터</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div class="guide">
      <strong>조작법</strong><br>
      공을 <strong>클릭/터치</strong>하면 즉시 두 개로 분열합니다.<br>
      <strong>수</strong>가 적힌 공은 터지면 <strong>박</strong> 공 2개가 되고, <strong>박</strong> 공은 터지면 <strong>수</strong> 공 2개가 됩니다.<br>
      처음엔 느리게 시작하고, 분열이 진행될수록 점점 빨라집니다. 공끼리 부딪히거나 벽에 닿으면 방향을 바꿔 계속 통통 튑니다.
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const countStat = document.getElementById('countStat');
    const modeStat = document.getElementById('modeStat');
    const resetBtn = document.getElementById('resetBtn');

    let balls = [];
    let animationId = null;
    const BASE_MIN_SPEED = 0.75;
    const BASE_MAX_SPEED = 1.45;
    const MAX_BALLS = 80;

    function getSpeedScale() {
      return Math.min(2.35, 1 + (balls.length - 1) * 0.035);
    }

    function getCurrentMinSpeed() {
      return BASE_MIN_SPEED * getSpeedScale();
    }

    function getCurrentMaxSpeed() {
      return BASE_MAX_SPEED * getSpeedScale();
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clampVelocity(ball) {
      const min = getCurrentMinSpeed();
      const max = getCurrentMaxSpeed();
      const speed = Math.hypot(ball.vx, ball.vy) || 1;
      if (speed < min || speed > max) {
        const target = Math.min(max, Math.max(min, speed));
        ball.vx = (ball.vx / speed) * target;
        ball.vy = (ball.vy / speed) * target;
      }
    }

    function makeVelocity() {
      const min = getCurrentMinSpeed();
      const max = getCurrentMaxSpeed();
      let vx = rand(-max, max);
      let vy = rand(-max, max);
      if (Math.abs(vx) < min) vx = min * Math.sign(vx || 1);
      if (Math.abs(vy) < min) vy = min * Math.sign(vy || -1);
      return { vx, vy };
    }

    function createBall(x, y, text, radius = 34) {
      const { vx, vy } = makeVelocity();
      return {
        x,
        y,
        vx,
        vy,
        radius,
        text,
        color: text === '수' ? '#22c55e' : '#f97316',
        ring: text === '수' ? '#166534' : '#9a3412'
      };
    }

    function seedGame() {
      resizeCanvas();
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      balls = [createBall(w / 2, h / 2, '수', 38)];
      updateStats();
    }

    function updateStats() {
      countStat.textContent = `공 개수: ${balls.length}`;
      modeStat.textContent = balls.length >= MAX_BALLS ? '상태: 최대치 도달' : `상태: 속도 x${getSpeedScale().toFixed(2)}`;
    }

    function clampToBounds(ball) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      if (ball.x - ball.radius < 0) {
        ball.x = ball.radius;
        ball.vx *= -1;
      }
      if (ball.x + ball.radius > w) {
        ball.x = w - ball.radius;
        ball.vx *= -1;
      }
      if (ball.y - ball.radius < 0) {
        ball.y = ball.radius;
        ball.vy *= -1;
      }
      if (ball.y + ball.radius > h) {
        ball.y = h - ball.radius;
        ball.vy *= -1;
      }
      clampVelocity(ball);
    }

    function moveBalls() {
      for (const ball of balls) {
        ball.x += ball.vx;
        ball.y += ball.vy;
        clampToBounds(ball);
      }
    }

    function resolveBallCollisions() {
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i];
          const b = balls[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.hypot(dx, dy);
          const minDist = a.radius + b.radius;

          if (dist > 0 && dist < minDist) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = (minDist - dist) / 2;

            a.x -= nx * overlap;
            a.y -= ny * overlap;
            b.x += nx * overlap;
            b.y += ny * overlap;

            const dvx = a.vx - b.vx;
            const dvy = a.vy - b.vy;
            const impact = dvx * nx + dvy * ny;

            if (impact > 0) continue;

            const impulse = -impact;
            a.vx += -impulse * nx;
            a.vy += -impulse * ny;
            b.vx += impulse * nx;
            b.vy += impulse * ny;

            const bump = 0.08 * getSpeedScale();
            a.vx += -nx * bump;
            a.vy += -ny * bump;
            b.vx += nx * bump;
            b.vy += ny * bump;
            clampVelocity(a);
            clampVelocity(b);
          }
        }
      }
    }

    function drawBall(ball) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = ball.color;
      ctx.fill();
      ctx.lineWidth = 4;
      ctx.strokeStyle = ball.ring;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(ball.x - ball.radius * 0.24, ball.y - ball.radius * 0.28, ball.radius * 0.24, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.font = `700 ${Math.max(18, ball.radius * 0.85)}px Arial, Apple SD Gothic Neo, Malgun Gothic, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ball.text, ball.x, ball.y + 1);
    }

    function draw() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let i = 0; i < 10; i++) {
        ctx.beginPath();
        ctx.arc((i * 97) % w, (i * 73) % h, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const ball of balls) {
        drawBall(ball);
      }
    }

    function animate() {
      moveBalls();
      resolveBallCollisions();
      draw();
      animationId = requestAnimationFrame(animate);
    }

    function findBallAt(x, y) {
      for (let i = balls.length - 1; i >= 0; i--) {
        const ball = balls[i];
        const dx = x - ball.x;
        const dy = y - ball.y;
        if (Math.hypot(dx, dy) <= ball.radius) {
          return i;
        }
      }
      return -1;
    }

    function normalizePosition(source, radius) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      source.x = Math.max(radius, Math.min(w - radius, source.x));
      source.y = Math.max(radius, Math.min(h - radius, source.y));
    }

    function rebalanceAllSpeeds() {
      for (const ball of balls) {
        clampVelocity(ball);
      }
    }

    function splitBall(index) {
      if (index < 0 || index >= balls.length) return;
      if (balls.length >= MAX_BALLS) {
        updateStats();
        return;
      }

      const original = balls[index];
      const nextText = original.text === '수' ? '박' : '수';
      const newRadius = Math.max(20, original.radius * 0.88);
      const offset = original.radius * 0.7;

      const first = createBall(original.x - offset, original.y, nextText, newRadius);
      const second = createBall(original.x + offset, original.y, nextText, newRadius);

      const splitKick = 0.18 * getSpeedScale();
      first.vx = -Math.abs(first.vx) - splitKick;
      second.vx = Math.abs(second.vx) + splitKick;
      first.vy += rand(-0.25, 0.25);
      second.vy += rand(-0.25, 0.25);

      normalizePosition(first, first.radius);
      normalizePosition(second, second.radius);

      balls.splice(index, 1, first, second);

      if (balls.length > MAX_BALLS) {
        balls = balls.slice(0, MAX_BALLS);
      }

      rebalanceAllSpeeds();
      updateStats();
    }

    function pointerToCanvas(event) {
      const rect = canvas.getBoundingClientRect();
      const clientX = event.clientX ?? (event.touches && event.touches[0]?.clientX);
      const clientY = event.clientY ?? (event.touches && event.touches[0]?.clientY);
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function handlePointer(event) {
      event.preventDefault();
      const { x, y } = pointerToCanvas(event);
      const hitIndex = findBallAt(x, y);
      if (hitIndex !== -1) {
        splitBall(hitIndex);
      }
    }

    function resetGame() {
      seedGame();
      draw();
    }

    canvas.addEventListener('click', handlePointer);
    canvas.addEventListener('touchstart', handlePointer, { passive: false });
    resetBtn.addEventListener('click', resetGame);
    window.addEventListener('resize', () => {
      const previous = balls.map(ball => ({ ...ball }));
      resizeCanvas();
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      balls = previous.map(ball => {
        ball.x = Math.min(Math.max(ball.radius, ball.x), w - ball.radius);
        ball.y = Math.min(Math.max(ball.radius, ball.y), h - ball.radius);
        clampVelocity(ball);
        return ball;
      });
      draw();
    });

    resetGame();
    if (animationId) cancelAnimationFrame(animationId);
    animate();
  </script>
</body>
</html>
