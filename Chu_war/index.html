<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>전략계급전</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/revealed_marker.css" />
</head>
<body>
  <main class="app">
    <section class="board-panel">
      <header class="hero">
        <div>
          <p class="eyebrow">비공개 정보 전략 보드게임</p>
          <h1>전략계급전</h1>
          <p class="field-hint">상단 진영: 위쪽 4행 · 하단 진영: 아래쪽 4행</p>
        </div>
        <button id="newGameBtn" class="primary">새 게임</button>
      </header>
      <div class="zone-label">▲ 상단 플레이어 진영</div>
      <div id="board" class="board" aria-label="8x8 보드"></div>
      <div class="zone-label">▼ 하단 플레이어 진영</div>
    </section>
    <aside class="side-panel">
      <section class="card"><div class="card-title">현재 상태</div><div id="statusText" class="status-text"></div><div id="turnGuide" class="turn-guide"></div></section>
      <section class="card"><div class="card-title">게임 모드</div><select id="modeSelect" class="mode-select"><option value="human">사람 vs 사람</option><option value="ai-easy">사람 vs AI 쉬움</option><option value="ai-normal">사람 vs AI 보통</option><option value="ai-bom">사람 vs 봄</option><option value="ai-summer">사람 vs 여름</option></select><p class="muted">AI는 상단 플레이어를 담당합니다.</p></section>
      <section id="setupPanel" class="card"><div class="card-title">배치</div><p id="setupHelp" class="muted"></p><div id="pieceTray" class="piece-tray"></div><div class="button-grid"><button id="randomBtn" class="secondary">랜덤 배치</button><button id="clearSetupBtn" class="secondary">배치 초기화</button><button id="finishSetupBtn" class="primary">배치 완료</button></div></section>
      <section id="playPanel" class="card hidden"><div class="card-title">행동</div><div id="selectedInfo" class="selected-info muted">기물을 선택하세요.</div><div class="button-grid"><button id="passBtn" class="secondary">패스</button></div></section>
      <section class="card"><div class="card-title">경기 로그</div><p id="matchLogStatus" class="muted">저장된 경기 로그: 0개</p><div class="button-grid"><button id="copyMatchLogBtn" class="secondary">최근 로그 복사</button><button id="downloadMatchLogBtn" class="secondary">JSON 다운로드</button><button id="clearMatchLogBtn" class="secondary">로그 초기화</button></div></section>
      <section class="card"><div class="card-title">제거된 기물</div><strong>상단 제거</strong><div id="capturedTop" class="captured-list"></div><strong>하단 제거</strong><div id="capturedBottom" class="captured-list"></div></section>
      <section class="card"><div class="card-title">최근 기록</div><div id="logList" class="log-list"></div></section>
    </aside>
  </main>
  <div id="cover" class="cover hidden"><div class="modal"><h2 id="coverTitle">턴 전환</h2><p id="coverMessage"></p><button id="readyBtn" class="primary wide">준비 완료</button></div></div>
  <div id="alertModal" class="cover hidden"><div class="modal"><h2 id="alertTitle">알림</h2><div id="alertBody" class="alert-body"></div><button id="alertOkBtn" class="primary wide">확인</button></div></div>
  <script src="js/constants.js"></script><script src="js/state.js"></script><script src="js/movement.js"></script><script src="js/battle.js"></script><script src="js/victory.js"></script><script src="js/setup.js"></script><script src="js/render.js"></script><script src="js/main.js"></script><script src="js/ai.js"></script><script src="js/ai_setup.js"></script><script src="js/ai_summer.js"></script><script src="js/ai_special_guard.js"></script><script src="js/match_log.js"></script>
</body>
</html>
