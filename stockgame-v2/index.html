<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내일 주가 맞추기 게임 v2</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app">
    <section class="intro-screen" id="introScreen">
      <div class="intro-card">
        <p class="eyebrow">Stock Game v2</p>
        <h1>차트 보고 매수 / 매도 결정하기</h1>
        <p class="intro-text">모바일에서도 한눈에 보이도록 구조를 단순화했습니다. 시작하면 바로 얇은 상태바와 차트 중심 화면으로 들어갑니다.</p>
        <div class="intro-list">
          <div>유형 1 · 전날까지 차트만 보고 다음 날 시가 방향 예측</div>
          <div>유형 2 · 해당일 시가 정보만 추가로 받고 종가 방향 예측</div>
          <div>100만원으로 시작해 매수 / 매도 수익률 반영</div>
          <div>원숭이의 무작위 매매와 성과 비교</div>
        </div>
        <button id="startBtn" class="primary-btn start-btn">게임 시작</button>
      </div>
    </section>

    <section class="game-screen" id="gameScreen" hidden>
      <header class="status-bar panel">
        <div class="status-item"><span>내 수익률</span><strong id="userReturnText">0.00%</strong></div>
        <div class="status-item"><span>원숭이</span><strong id="monkeyReturnText">0.00%</strong></div>
        <div class="status-item"><span>남은 문제</span><strong id="remainingText">-</strong></div>
        <div class="status-item compact"><span>내 잔고</span><strong id="userBalanceText">₩1,000,000</strong></div>
        <div class="status-item compact"><span>원숭이 잔고</span><strong id="monkeyBalanceText">₩1,000,000</strong></div>
        <button id="resetBtn" class="ghost-btn reset-small">새 게임</button>
      </header>

      <section class="panel chart-panel">
        <div id="chart" class="chart"></div>
        <div class="chart-note" id="chartNote">문제 데이터를 불러오는 중...</div>
      </section>

      <section class="panel question-panel" id="questionPanel">
        <div class="question-topline">
          <strong id="questionTypeText">-</strong>
          <span id="marketText">-</span>
        </div>
        <h2 id="questionTitle">문제</h2>
        <p class="question-guide" id="questionGuide"></p>
        <div class="open-hint
