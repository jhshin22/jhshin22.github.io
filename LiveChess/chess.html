function attacked(b,tr,tc,by){for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(p&&color(p)===by&&canAttack(b,r,c,tr,tc))return true}return false}
function canAttack(b,r,c,tr,tc){const p=b[r][c],co=color(p),t=type(p),dr=tr-r,dc=tc-c;if(t==="P"){const d=co==="w"?-1:1;return dr===d&&Math.abs(dc)===1}if(t==="N")return Math.abs(dr)===2&&Math.abs(dc)===1||Math.abs(dr)===1&&Math.abs(dc)===2;if(t==="K")return Math.max(Math.abs(dr),Math.abs(dc))===1;if(t==="R")return(dr===0||dc===0)&&clearPath(b,r,c,tr,tc);if(t==="B")return Math.abs(dr)===Math.abs(dc)&&clearPath(b,r,c,tr,tc);if(t==="Q")return(dr===0||dc===0||Math.abs(dr)===Math.abs(dc))&&clearPath(b,r,c,tr,tc);return false}
function clearPath(b,r,c,tr,tc){let rs=Math.sign(tr-r),cs=Math.sign(tc-c),nr=r+rs,nc=c+cs;while(nr!==tr||nc!==tc){if(b[nr][nc])return false;nr+=rs;nc+=cs}return true}
function findKing(b,co){for(let r=0;r<8;r++)for(let c=0;c<8;c++)if(b[r][c]===co+"K")return{row:r,col:c};return null}
function apply(b,m,prom="Q"){const p=b[m.from.row][m.from.col];b[m.from.row][m.from.col]=null;if(m.isEnPassant&&m.capturedSquare)b[m.capturedSquare.row][m.capturedSquare.col]=null;b[m.to.row][m.to.col]=p;if(m.isCastling){const rook=b[m.rookFrom.row][m.rookFrom.col];b[m.rookFrom.row][m.rookFrom.col]=null;b[m.rookTo.row][m.rookTo.col]=rook}if(p&&type(p)==="P"&&(m.to.row===0||m.to.row===7))b[m.to.row][m.to.col]=color(p)+prom}
function captured(b,m){return m.isEnPassant&&m.capturedSquare?b[m.capturedSquare.row][m.capturedSquare.col]:b[m.to.row][m.to.col]}
function updateCastle(p,m,cap){const co=color(p),t=type(p);if(t==="K")castle[co].kingSide=castle[co].queenSide=false;if(t==="R")disableCastle(co,m.from.row,m.from.col);if(cap&&type(cap)==="R"&&!m.isEnPassant)disableCastle(color(cap),m.to.row,m.to.col)}
function disableCastle(co,r,c){const hr=co==="w"?7:0;if(r!==hr)return;if(c===0)castle[co].queenSide=false;if(c===7)castle[co].kingSide=false}
function updateEP(p,m){if(type(p)==="P"&&Math.abs(m.to.row-m.from.row)===2)ep={row:(m.from.row+m.to.row)/2,col:m.from.col,pawnRow:m.to.row,pawnCol:m.to.col,pawnColor:color(p),validFor:other(color(p))};else ep=null}
function notation(p,m,cap,prom,chk,mate){if(m.isCastling)return(m.castleSide==="kingSide"?"O-O":"O-O-O")+(mate?"#":chk?"+":"");return`${SYM[p]} ${sqName(m.from.row,m.from.col)}${cap?"x":"-"}${sqName(m.to.row,m.to.col)}${m.isPromotion?`=${SYM[color(p)+prom]}`:""}${m.isEnPassant?" e.p.":""}${mate?"#":chk?"+":""}`}
function startTimer(){stopTimer();lastTick=Date.now();tickId=setInterval(tickTimer,1000)}function stopTimer(){if(tickId)clearInterval(tickId);tickId=null}
function tickTimer(){const now=Date.now(),dt=now-lastTick;lastTick=now;if(over||!limit){renderTimers();return}time[turn]=Math.max(0,time[turn]-dt);if(time[turn]<=0){over=true;sel=null;selMoves=[];clearAI();msg=`시간 초과! ${cname(other(turn))} 승리입니다.`;render();saveGame();return}renderTimers()}
function fmtClock(ms){if(!limit)return"∞";const s=Math.ceil(Math.max(0,ms)/1000),m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`}
function isAITurn(){return mode==="ai"&&turn===aiColor&&!over}function clearAI(){if(aiId)clearTimeout(aiId);aiId=null;aiThinking=false}
function maybeAI(){if(!isAITurn()||promo)return;clearAI();aiThinking=true;msg=`AI(${cname(aiColor)})가 수를 계산 중입니다.`;render();aiId=setTimeout(aiMove,520)}
function aiMove(){aiId=null;if(!isAITurn()){aiThinking=false;render();return}const ch=chooseAI();aiThinking=false;if(ch)move(ch.m,ch.prom,{recordUndo:true,autoSave:true,allowAIResponse:true})}
function chooseAI(){const ms=allLegal(B,aiColor);if(!ms.length)return null;let best=-1e9,arr=[];for(const m of ms){const ps=m.isPromotion?PROM:["Q"];for(const prom of ps){const nb=clone(B),cap=captured(B,m);apply(nb,m,prom);let sc=evalBoard(nb,aiColor)+(cap?VAL[type(cap)]*.12:0)+(inCheck(nb,other(aiColor))?45:0)+center(m.to.row,m.to.col)+Math.random()*6;if(sc>best+.001){best=sc;arr=[{m,prom}]}else if(Math.abs(sc-best)<=.001)arr.push({m,prom})}}return arr[Math.floor(Math.random()*arr.length)]}
function evalBoard(b,co){let s=0;for(let r=0;r<8;r++)for(let c=0;c<8;c++){const p=b[r][c];if(p)s+=(color(p)===co?1:-1)*VAL[type(p)]}return s}function center(r,c){return Math.max(0,7-(Math.abs(r-3.5)+Math.abs(c-3.5)))*2}
function saveGame(){try{localStorage.setItem(KEY,JSON.stringify({s:snapshot(),mode,aiColor,undo,limit}));saved=new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});if(saveEl)saveEl.textContent=`자동 저장됨 · ${saved}`}catch(e){if(saveEl)saveEl.textContent="자동 저장 실패"}}
function loadGame(){try{const raw=localStorage.getItem(KEY);if(!raw)return false;const d=JSON.parse(raw);mode=d.mode||"human";aiColor=d.aiColor||"b";limit=typeof d.limit==="number"?d.limit:600000;undo=Array.isArray(d.undo)?d.undo:[];restore(d.s);saved="불러옴";render();startTimer();maybeAI();return true}catch(e){localStorage.removeItem(KEY);return false}}
function clearSave(){localStorage.removeItem(KEY);saved=null;init(false);saveEl.textContent="저장 데이터를 초기화했습니다."}
function modeChange(){const v=modeEl.value;if(v==="human"){mode="human";aiColor="b"}else{mode="ai";aiColor=v.endsWith("w")?"w":"b"}init(true)}function timerChange(){limit=Number(timerEl.value);init(true)}
function mv(fr,fc,tr,tc,ex={}){return{from:{row:fr,col:fc},to:{row:tr,col:tc},...ex}}function clone(b){return b.map(x=>x.slice())}function inb(r,c){return r>=0&&r<8&&c>=0&&c<8}function color(p){return p[0]}function type(p){return p[1]}function other(c){return c==="w"?"b":"w"}function cname(c){return c==="w"?"백":"흑"}function sqName(r,c){return F[c]+(8-r)}function same(a,b){return a&&b&&a.row===b.row&&a.col===b.col}function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
newBtn.onclick=()=>init(true);undoBtn.onclick=undoMove;clearBtn.onclick=clearSave;modeEl.onchange=modeChange;timerEl.onchange=timerChange;window.addEventListener("beforeunload",saveGame);if(!loadGame())init(true);
</script></body></html>
