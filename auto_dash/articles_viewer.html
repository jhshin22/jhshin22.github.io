<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>기사 후보 리스트 뷰어</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --good: #047857;
      --warn: #b45309;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; background: var(--bg); color: var(--text); }
    header { position: sticky; top: 0; z-index: 10; background: rgba(246, 248, 251, 0.94); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 18px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .sub { margin: 0; color: var(--muted); font-size: 14px; }
    .controls { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; margin-top: 16px; align-items: end; }
    .control { display: flex; flex-direction: column; gap: 6px; }
    .control label { font-size: 12px; color: var(--muted); }
    input, select, button { height: 38px; border: 1px solid var(--line); border-radius: 10px; background: #fff; padding: 0 10px; font: inherit; }
    button { cursor: pointer; font-weight: 650; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.ghost { background: #fff; }
    .date { grid-column: span 3; }
    .sort { grid-column: span 2; }
    .query { grid-column: span 4; }
    .load { grid-column: span 1; }
    .copyall { grid-column: span 2; }
    .label-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .label-tab { height: 34px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: #374151; padding: 0 12px; font-size: 13px; font-weight: 700; }
    .label-tab.active { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
    .status { margin-top: 12px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; background: #fff; color: var(--muted); font-size: 14px; }
    main .wrap { padding-top: 14px; }
    .article { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin: 12px 0; box-shadow: 0 2px 10px rgba(17, 24, 39, 0.04); }
    .topline { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .title { margin: 0; font-size: 18px; line-height: 1.35; }
    .score { min-width: 76px; text-align: center; border-radius: 999px; padding: 7px 10px; background: #eff6ff; color: #1d4ed8; font-weight: 800; }
    .meta { margin-top: 8px; color: var(--muted); font-size: 13px; display: flex; flex-wrap: wrap; gap: 8px; }
    .desc { margin: 12px 0 0; line-height: 1.55; color: #374151; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .chip { font-size: 12px; padding: 5px 8px; border-radius: 999px; background: #f3f4f6; color: #374151; }
    .chip.warn { background: #fff7ed; color: var(--warn); }
    .chip.good { background: #ecfdf5; color: var(--good); }
    .chip.bad { background: #fef2f2; color: var(--bad); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .actions a, .actions button { display: inline-flex; align-items: center; justify-content: center; height: 36px; border-radius: 10px; border: 1px solid var(--line); padding: 0 12px; background: #fff; color: var(--text); text-decoration: none; font-weight: 650; font-size: 14px; }
    .actions a.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .empty { padding: 40px 18px; text-align: center; color: var(--muted); }
    @media (max-width: 760px) { .controls { grid-template-columns: 1fr; } .date, .sort, .query, .load, .copyall { grid-column: span 1; } .topline { flex-direction: column; } .score { min-width: auto; } .label-tabs { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; } .label-tab { flex: 0 0 auto; } }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>기사 후보 리스트 뷰어</h1>
      <p class="sub">일자별 raw JSON을 불러와 pre_score 기준으로 정렬하고, 기사 링크를 확인/복사합니다.</p>
      <div class="controls">
        <div class="control date"><label for="dateInput">기사 날짜</label><input id="dateInput" type="date" autocomplete="off" /></div>
        <div class="control sort"><label for="sortSelect">정렬</label><select id="sortSelect"><option value="desc">pre_score 높은 순</option><option value="asc">pre_score 낮은 순</option><option value="time_desc">최신 기사 순</option><option value="time_asc">오래된순</option></select></div>
        <div class="control query"><label for="searchInput">검색</label><input id="searchInput" type="search" placeholder="제목, 설명, 키워드 검색" autocomplete="off" /></div>
        <div class="control load"><label>&nbsp;</label><button class="primary" id="loadBtn">불러오기</button></div>
        <div class="control copyall"><label>&nbsp;</label><button class="ghost" id="copyAllBtn">전체 복사</button></div>
      </div>
      <div class="label-tabs" id="labelTabs" aria-label="라벨 필터"></div>
      <div class="status" id="status">날짜를 선택한 뒤 불러오기를 누르세요.</div>
    </div>
  </header>
  <main><div class="wrap" id="list"></div></main>

  <script>
    const LABEL_RULE_PATH = 'config/label_rules.json';
    const FALLBACK_LABELS = [
      {id:'policy_regulation', name:'정책/규제', keywords:['DSR','DTI','LTV','대출 규제','금융위원회 대출','금융감독원 대출','금융소비자','금소법']},
      {id:'rate_indicator', name:'금리/지표', keywords:['대출 금리','가계부채','연체율','신용점수','신용평가']},
      {id:'market_direction', name:'시장방향', keywords:['부동산 대출','주택시장 대출','주택담보대출','주담대','전세대출','가계대출','가계부채']},
      {id:'risk_npl', name:'리스크/연체', keywords:['연체율','채무조정','개인회생','취약차주','저신용자','가계부채']},
      {id:'retail_lending_strategy', name:'소매대출전략', keywords:['신용대출','대환대출','대출 갈아타기','카드론','현금서비스','마이너스통장','소상공인 대출','자영업자 대출','은행권 대출','저축은행 대출','카드사 대출','고신용자','저신용자','신용점수','신용평가']},
      {id:'insurance_issue', name:'보험사', keywords:['보험계약대출','약관대출','보험사 대출','생명보험 대출','교보생명']},
      {id:'ai_trend', name:'AI', keywords:['금융 AI','AI 활용']}
    ];

    const dateInput = document.getElementById('dateInput');
    const sortSelect = document.getElementById('sortSelect');
    const searchInput = document.getElementById('searchInput');
    const loadBtn = document.getElementById('loadBtn');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');
    const labelTabsEl = document.getElementById('labelTabs');
    let rawArticles = [];
    let currentPayload = null;
    let loadedPath = '';
    let selectedLabel = '';
    let labelRules = FALLBACK_LABELS;

    function todayKstString() {
      const formatter = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit' });
      return formatter.format(new Date());
    }
    function initialDateString() {
      const params = new URLSearchParams(window.location.search);
      const requestedDate = params.get('date');
      if (requestedDate === 'today') return todayKstString();
      if (/^\d{4}-\d{2}-\d{2}$/.test(requestedDate || '')) return requestedDate;
      return todayKstString();
    }
    function hasFixedDateParam() { return new URLSearchParams(window.location.search).has('date'); }
    function dataPathFromDate(date) { const [year, month] = String(date).split('-'); return `data/raw/${year}/${month}/articles_raw_${date}.json`; }
    function legacyPathFromDate(date) { return `articles_raw_${date}.json`; }
    function escapeHtml(value) { return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;'); }
    function articleUrl(article) { return article.url || article.naver_link || ''; }
    function articleText(article) {
      const keywords = Array.isArray(article.matched_keywords) ? article.matched_keywords.join(', ') : '';
      return [`제목: ${article.title || ''}`, `출처: ${article.source || ''}`, `게시일: ${article.published_at || ''}`, `pre_score: ${article.pre_score ?? 0}`, `키워드: ${keywords}`, `요약: ${article.description || ''}`, `링크: ${articleUrl(article)}`].join('\n');
    }
    async function copyText(text, button) {
      try { await navigator.clipboard.writeText(text); const original = button.textContent; button.textContent = '복사 완료'; setTimeout(() => button.textContent = original, 900); }
      catch (err) { const area = document.createElement('textarea'); area.value = text; document.body.appendChild(area); area.select(); document.execCommand('copy'); area.remove(); }
    }
    async function fetchJson(path) { const response = await fetch(`${path}?ts=${Date.now()}`); if (!response.ok) throw new Error(`HTTP ${response.status}`); return await response.json(); }
    async function loadLabelRules() {
      try {
        const data = await fetchJson(LABEL_RULE_PATH);
        if (Array.isArray(data.labels) && data.labels.length) {
          labelRules = data.labels.slice().sort((a, b) => (a.order || 0) - (b.order || 0));
        }
      } catch (err) {
        labelRules = FALLBACK_LABELS;
      }
      renderLabelTabs();
    }
    function matchedKeywordSet(article) { return new Set((article.matched_keywords || []).map(k => String(k).toLowerCase())); }
    function articleMatchesLabel(article, labelId) {
      if (!labelId) return true;
      const rule = labelRules.find(item => item.id === labelId);
      if (!rule) return true;
      const keywords = matchedKeywordSet(article);
      return (rule.keywords || []).some(keyword => keywords.has(String(keyword).toLowerCase()));
    }
    function renderLabelTabs() {
      const tabs = [{id: '', name: '전체', full_name: '전체 기사'}, ...labelRules];
      labelTabsEl.innerHTML = tabs.map(tab => `<button type="button" class="label-tab ${tab.id === selectedLabel ? 'active' : ''}" data-label="${escapeHtml(tab.id)}" title="${escapeHtml(tab.full_name || tab.name)}">${escapeHtml(tab.name)}</button>`).join('');
    }
    function filteredAndSorted() {
      const query = searchInput.value.trim().toLowerCase();
      let items = rawArticles.slice();
      items = items.filter(article => articleMatchesLabel(article, selectedLabel));
      if (query) items = items.filter(article => { const keywords = Array.isArray(article.matched_keywords) ? article.matched_keywords.join(' ') : ''; const text = `${article.title || ''} ${article.description || ''} ${article.source || ''} ${keywords}`.toLowerCase(); return text.includes(query); });
      const sort = sortSelect.value;
      items.sort((a, b) => { if (sort === 'asc') return (a.pre_score ?? 0) - (b.pre_score ?? 0); if (sort === 'time_desc') return String(b.published_at || '').localeCompare(String(a.published_at || '')); if (sort === 'time_asc') return String(a.published_at || '').localeCompare(String(b.published_at || '')); return (b.pre_score ?? 0) - (a.pre_score ?? 0); });
      return items;
    }
    function render() {
      renderLabelTabs();
      const items = filteredAndSorted();
      const total = rawArticles.length;
      const targetDate = currentPayload?.target_date || dateInput.value || 'legacy';
      const selectedLabelName = selectedLabel ? (labelRules.find(item => item.id === selectedLabel)?.name || selectedLabel) : '전체';
      statusEl.textContent = `${targetDate} 기준 / 라벨: ${selectedLabelName} / 전체 ${total.toLocaleString()}건 / 현재 표시 ${items.length.toLocaleString()}건 / 파일: ${loadedPath}`;
      if (!items.length) { listEl.innerHTML = '<div class="empty">표시할 기사가 없습니다.</div>'; return; }
      listEl.innerHTML = items.map((article, index) => {
        const keywords = Array.isArray(article.matched_keywords) ? article.matched_keywords : [];
        const flags = article.flags || {};
        const url = articleUrl(article) || '#';
        const chips = [...keywords.map(k => `<span class="chip">${escapeHtml(k)}</span>`), flags.loan_related ? '<span class="chip good">loan_related</span>' : '<span class="chip bad">low_relevance?</span>', flags.possible_ad ? '<span class="chip warn">possible_ad</span>' : '', flags.trusted_source ? '<span class="chip good">trusted_source</span>' : ''].join('');
        return `<article class="article" data-index="${index}">
          <div class="topline"><h2 class="title">${escapeHtml(article.title)}</h2><div class="score">${escapeHtml(article.pre_score ?? 0)}점</div></div>
          <div class="meta"><span>${escapeHtml(article.source || 'unknown')}</span><span>${escapeHtml(article.published_at || '')}</span><span>ID: ${escapeHtml(article.id || '')}</span></div>
          <p class="desc">${escapeHtml(article.description || '')}</p>
          <div class="chips">${chips}</div>
          <div class="actions"><a class="primary" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">기사 바로가기</a><button type="button" data-copy-index="${index}">링크 복사하기</button>${article.naver_link && article.naver_link !== article.url ? `<a href="${escapeHtml(article.naver_link)}" target="_blank" rel="noopener noreferrer">네이버 링크</a>` : ''}</div>
        </article>`;
      }).join('');
      document.querySelectorAll('[data-copy-index]').forEach(button => { button.addEventListener('click', () => copyText(articleUrl(items[Number(button.dataset.copyIndex)]), button)); });
    }
    async function loadArticles() {
      const date = dateInput.value || initialDateString(); dateInput.value = date;
      const dailyPath = dataPathFromDate(date); const legacyDailyPath = legacyPathFromDate(date); const legacyPath = 'articles_raw.json';
      statusEl.textContent = `${dailyPath} 불러오는 중...`; listEl.innerHTML = '';
      try { currentPayload = await fetchJson(dailyPath); loadedPath = dailyPath; }
      catch (dailyErr) {
        try { statusEl.textContent = `${dailyPath} 없음. 기존 ${legacyDailyPath}를 불러오는 중...`; currentPayload = await fetchJson(legacyDailyPath); loadedPath = legacyDailyPath; }
        catch (legacyDailyErr) {
          try { statusEl.textContent = `${legacyDailyPath} 없음. 기존 articles_raw.json을 불러오는 중...`; currentPayload = await fetchJson(legacyPath); loadedPath = legacyPath; if (Array.isArray(currentPayload.articles)) currentPayload = { ...currentPayload, articles: currentPayload.articles.filter(article => String(article.published_at || '').slice(0, 10) === date) }; }
          catch (legacyErr) { currentPayload = null; rawArticles = []; statusEl.textContent = `파일을 불러오지 못했습니다: ${dailyPath}, ${legacyDailyPath}, ${legacyPath} (${dailyErr.message} / ${legacyDailyErr.message} / ${legacyErr.message})`; listEl.innerHTML = '<div class="empty">해당 날짜 JSON 파일이 아직 없거나 GitHub Pages 반영 전입니다. Actions를 한 번 수동 실행하면 일자별 파일이 생성됩니다.</div>'; return; }
        }
      }
      rawArticles = Array.isArray(currentPayload.articles) ? currentPayload.articles : [];
      render();
    }
    copyAllBtn.addEventListener('click', () => { const items = filteredAndSorted(); const text = items.map((article, idx) => `[${idx + 1}]\n${articleText(article)}`).join('\n\n---\n\n'); copyText(text || '표시할 기사가 없습니다.', copyAllBtn); });
    loadBtn.addEventListener('click', loadArticles);
    sortSelect.addEventListener('change', render);
    searchInput.addEventListener('input', render);
    labelTabsEl.addEventListener('click', event => { const tab = event.target.closest('[data-label]'); if (!tab) return; selectedLabel = tab.dataset.label; render(); });
    dateInput.value = initialDateString();
    loadLabelRules();
    loadArticles();
    window.addEventListener('pageshow', () => {
      if (hasFixedDateParam()) return;
      const today = todayKstString();
      if (dateInput.value !== today) {
        dateInput.value = today;
        loadArticles();
      }
    });
  </script>
</body>
</html>
