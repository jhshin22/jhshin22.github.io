<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내일 주가 맞추기 게임</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Stock Game</p>
        <h1>내일 주가 맞추기</h1>
        <p class="subtitle">과거 일봉 캔들 + 거래량만 보고 다음 날 시가/종가 방향을 맞춰보세요.</p>
      </div>
      <button id="resetBtn" class="ghost-btn">새 게임</button>
    </header>

    <section class="panel info-panel">
      <div class="info-item"><span>문제</span><strong id="progressText">-</strong></div>
      <div class="info-item"><span>점수</span><strong id="scoreText">-</strong></div>
      <div class="info-item"><span>시장</span><strong id="marketText">-</strong></div>
    </section>

    <section class="panel chart-panel">
      <div id="chart" class="chart"></div>
      <div class="chart-note" id="chartNote">차트 오른쪽 빈칸 뒤에 숨겨진 다음 거래일을 맞혀보세요.</div>
    </section>

    <section class="panel question-panel" id="questionPanel">
      <h2>다음 거래일 예측</h2>
      <p class="question-guide">기준: <strong>전일 종가 대비</strong> 상승 / 하락</p>

      <div class="question-block">
        <p>1) 다음 날 <strong>시가</strong>는?</p>
        <div class="choice-group" data-question="open">
          <button class="choice-btn" data-value="up">상승</button>
          <button class="choice-btn" data-value="down">하락</button>
        </div>
      </div>

      <div class="question-block">
        <p>2) 다음 날 <strong>종가</strong>는?</p>
        <div class="choice-group" data-question="close">
          <button class="choice-btn" data-value="up">상승</button>
          <button class="choice-btn" data-value="down">하락</button>
        </div>
      </div>

      <div class="action-row">
        <button id="submitBtn" class="primary-btn">정답 제출</button>
        <button id="nextBtn" class="secondary-btn" hidden>다음 문제</button>
      </div>
      <p id="feedbackText" class="feedback"></p>
    </section>

    <section class="panel result-panel" id="resultPanel" hidden>
      <h2>최종 결과</h2>
      <p id="finalScore" class="final-score"></p>
      <div id="resultList" class="result-list"></div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
