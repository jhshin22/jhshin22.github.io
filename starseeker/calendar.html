<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StarSeeker | 한국 밤하늘 관측 캘린더</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="hero compact-hero">
    <div>
      <p class="eyebrow">Korea Night Sky Calendar</p>
      <h1>StarSeeker</h1>
      <p class="subtitle">한국 기준 일자별·시간대별 관측 추천 천체 캘린더</p>
    </div>
    <div class="hero-card" id="metadataCard">데이터를 불러오는 중...</div>
  </header>

  <main class="layout">
    <section class="panel calendar-panel">
      <div class="section-title">
        <button id="prevMonth" class="ghost-btn" type="button">‹</button>
        <h2 id="monthTitle">월간 캘린더</h2>
        <button id="nextMonth" class="ghost-btn" type="button">›</button>
      </div>
      <div class="weekday-grid" aria-hidden="true">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    <section class="panel controls-panel">
      <div class="section-title">
        <h2>필터</h2>
      </div>
      <div class="filters">
        <label>
          천체 유형
          <select id="categoryFilter">
            <option value="all">전체</option>
            <option value="moon">달</option>
            <option value="planet">행성</option>
            <option value="star">별</option>
            <option value="meteor_shower">유성우</option>
          </select>
        </label>
        <label>
          추천 등급
          <select id="gradeFilter">
            <option value="all">전체</option>
            <option value="excellent">매우 추천</option>
            <option value="good">추천</option>
            <option value="fair">조건부 가능</option>
          </select>
        </label>
      </div>
    </section>

    <section class="panel detail-panel">
      <div class="section-title">
        <h2 id="detailTitle">날짜를 선택하세요</h2>
      </div>
      <div id="detailList" class="event-list muted">캘린더에서 날짜를 누르면 관측 추천 카드가 표시됩니다.</div>
      <div id="eventDetail" class="event-detail muted">카드를 누르면 상세정보와 관측 주의사항이 표시됩니다.</div>
    </section>
  </main>

  <footer class="footer">
    <p>StarSeeker · Skyfield + Open-Meteo · Asia/Seoul</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
