name: Fix LiveChess layout

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-livechess-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch board grid CSS
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('LiveChess/chess.html')
          s = path.read_text(encoding='utf-8')
          old_board = '.board{width:100%;aspect-ratio:1;display:grid;grid-template-columns:repeat(8,1fr);overflow:hidden;'
          new_board = '.board{width:100%;aspect-ratio:1;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);overflow:hidden;'
          old_sq = '.sq{position:relative;display:flex;align-items:center;justify-content:center;font-size:clamp(30px,7vw,62px);line-height:1;text-shadow:'
          new_sq = '.sq{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:100%;min-width:0;min-height:0;padding:0;font-size:clamp(30px,7vw,62px);line-height:1;text-shadow:'
          s2 = s.replace(old_board, new_board, 1).replace(old_sq, new_sq, 1)
          if s2 == s:
              print('No CSS patch needed.')
          else:
              path.write_text(s2, encoding='utf-8')
              print('Patched LiveChess/chess.html')
          PY
      - name: Commit patch if changed
        run: |
          if git diff --quiet -- LiveChess/chess.html; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add LiveChess/chess.html
          git commit -m "Fix LiveChess board grid layout"
          git push
