name: Collect Naver News

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. KST = UTC+9.
    # Runs at 07:00, 12:00, 17:00, 23:00 KST every day.
    - cron: '0 22 * * *'  # 07:00 KST
    - cron: '0 3 * * *'   # 12:00 KST
    - cron: '0 8 * * *'   # 17:00 KST
    - cron: '0 14 * * *'  # 23:00 KST

permissions:
  contents: write

concurrency:
  group: naver-news-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Collect today's Naver News articles
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          TARGET_DATE=$(TZ=Asia/Seoul date +%F)
          YEAR=$(TZ=Asia/Seoul date +%Y)
          MONTH=$(TZ=Asia/Seoul date +%m)
          OUTPUT_PATH="auto_dash/data/raw/${YEAR}/${MONTH}/articles_raw_${TARGET_DATE}.json"

          python auto_dash/naver_news_collector.py \
            --target-date today \
            --output "$OUTPUT_PATH" \
            --display 20 \
            --pages 1 \
            --sort date

      - name: Commit and push if daily JSON changed
        run: |
          git add auto_dash/data/raw/**/*.json

          if git diff --cached --quiet; then
            echo "No article changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update daily raw Naver news articles"
          git pull --rebase origin main
          git push
