name: Build stockgame dataset

on:
  workflow_dispatch:
  schedule:
    - cron: '15 21 * * 0'

permissions:
  contents: write

jobs:
  build-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stockgame/requirements.txt

      - name: Generate dataset
        run: python stockgame/build_dataset.py

      - name: Commit updated dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stockgame/data/problems.json
          git diff --cached --quiet && exit 0
          git commit -m "Update stockgame dataset"
          git push
