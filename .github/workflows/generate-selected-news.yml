name: Generate Selected News

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. KST = UTC+9.
    # Runs at 00:10 KST every day.
    - cron: '10 15 * * *'

permissions:
  contents: write

concurrency:
  group: generate-selected-news
  cancel-in-progress: false

jobs:
  generate-selected-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebase to latest main before generation
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Generate selected news JSON
        run: |
          python auto_dash/generate_selected_news.py --run-date today

      - name: Commit and push selected JSON if changed
        run: |
          RUN_DAY=$(TZ=Asia/Seoul date +%F)
          YEAR=$(TZ=Asia/Seoul date +%Y)
          MONTH=$(TZ=Asia/Seoul date +%m)
          TARGET="auto_dash/data/selected/${YEAR}/${MONTH}/news_${RUN_DAY}.json"

          if [ ! -f "$TARGET" ]; then
            echo "No selected JSON generated for ${RUN_DAY}."
            exit 0
          fi

          git add "$TARGET"

          if git diff --cached --quiet; then
            echo "No selected news changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "update selected news json for ${RUN_DAY}"
          git push origin HEAD:main
