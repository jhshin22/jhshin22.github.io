name: Update StarSeeker

on:
  workflow_dispatch:
  schedule:
    - cron: "20 20 * * *" # 05:20 KST
  push:
    paths:
      - "starseeker/scripts/**"
      - "starseeker/config/**"
      - "starseeker/requirements.txt"
      - ".github/workflows/update-starseeker.yml"

concurrency:
  group: update-starseeker-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: starseeker/requirements.txt

      - name: Cache Skyfield ephemeris
        uses: actions/cache@v4
        with:
          path: starseeker/data/skyfield_cache
          key: starseeker-skyfield-de421-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --retries 5 --timeout 60 -r starseeker/requirements.txt

      - name: Build StarSeeker data
        env:
          ASTRO_LOCATION_NAME: "Seoul Jongno"
          ASTRO_LAT: "37.5729"
          ASTRO_LON: "126.9794"
          ASTRO_ELEVATION_M: "50"
          ASTRO_TIMEZONE: "Asia/Seoul"
          KASI_API_KEY: ${{ secrets.KASI_API_KEY }}
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
        run: |
          cd starseeker
          for attempt in 1 2 3; do
            echo "StarSeeker build attempt ${attempt}/3"
            if python scripts/build_all.py --days 30; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 20))
            fi
          done
          exit 1

      - name: Validate output
        run: |
          cd starseeker
          python scripts/validate_output.py
          pytest tests

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add starseeker/data/*.json
          if git diff --cached --quiet; then
            echo "No StarSeeker data changes"
          else
            git commit -m "Update StarSeeker data"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
